<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuaGenius - AI過去問ジェネレーター</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <span class="icon">🧠</span> QuaGenius <span class="version-badge">v1.4</span>
            </div>
            <div class="header-actions">
                <button id="statsBtn" class="icon-btn" title="成績・統計">📊</button>
                <button id="settingsBtn" class="icon-btn" title="API設定">⚙️</button>
            </div>
        </header>

        <main>
            <div class="glass-card controls-section">
                <div class="control-group">
                    <label for="examSelect">資格試験</label>
                    <div class="custom-select">
                        <select id="examSelect">
                            <option value="sme">中小企業診断士</option>
                            <option value="fp1">FP1級</option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <label for="categorySelect">出題分野</label>
                    <div class="custom-select">
                        <select id="categorySelect">
                            <!-- Dynamically populated -->
                        </select>
                    </div>
                </div>

                <div class="control-group checkbox-group">
                    <label class="check-label">
                        <input type="checkbox" id="calcOptionCheckbox">
                        <span>🧮 計算・グラフ(表)問題を優先する</span>
                    </label>
                </div>

                <div class="action-buttons">
                    <button id="generateBtn" class="primary-btn flex-1">
                        <span class="btn-text">新規問題を生成</span>
                        <div class="spinner hidden"></div>
                    </button>
                    <button id="reviewBtn" class="secondary-btn flex-1" disabled title="間違えた問題からランダムに出題します">
                        <span class="btn-text">📖 復習モード (<span id="mistakeCount">0</span>)</span>
                    </button>
                </div>
            </div>

            <!-- Quiz Display Area -->
            <div id="quizSection" class="glass-card quiz-section hidden">
                <div class="badge" id="engineBadge">Gemini 2.5</div>
                <h2 id="questionText">問題文がここに表示されます。</h2>
                
                <div id="optionsContainer" class="options-container">
                    <!-- Options populated by JS -->
                </div>
            </div>

            <!-- Result Display Area -->
            <div id="resultSection" class="glass-card result-section hidden">
                <div id="resultHeader" class="result-header">
                    <div id="resultIcon" class="result-icon"></div>
                    <h3 id="resultTitle">結果</h3>
                </div>
                
                <div class="explanation-box">
                    <h4>解説</h4>
                    <div id="explanationText" class="markdown-body"></div>
                </div>
                
                <button id="nextBtn" class="secondary-btn mt-4">
                    <span class="btn-text">次の問題へ</span>
                    <div class="spinner hidden"></div>
                </button>
            </div>
        </main>
    </div>

    <!-- API Key Modal -->
    <div id="apiModal" class="modal hidden">
        <div class="modal-content glass-card">
            <h2>初期設定・API選択</h2>
            <p class="modal-desc">問題生成に使用するAIエンジンを選択し、APIキーを入力してください。キーはブラウザに安全に保存されます。</p>
            
            <div class="engine-toggle">
                <label class="radio-label">
                    <input type="radio" name="aiEngine" value="gemini" checked>
                    <span>Gemini 2.5 Flash (推奨・高速)</span>
                </label>
                <label class="radio-label">
                    <input type="radio" name="aiEngine" value="openai">
                    <span>OpenAI GPT-4o-mini (有料API)</span>
                </label>
            </div>

            <div class="input-group mt-4" id="geminiKeyGroup">
                <label for="geminiApiKeyInput">Google Gemini API Key</label>
                <input type="password" id="geminiApiKeyInput" placeholder="AIzaSy...">
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="link-btn text-small mt-2">APIキーを取得する (無料)</a>
            </div>

            <div class="input-group mt-4 hidden" id="openaiKeyGroup">
                <label for="openaiApiKeyInput">OpenAI API Key</label>
                <input type="password" id="openaiApiKeyInput" placeholder="sk-proj-...">
                <a href="https://platform.openai.com/api-keys" target="_blank" class="link-btn text-small mt-2">APIキーを取得する (要課金登録)</a>
            </div>
            
            <div class="modal-actions mt-4">
                <button id="saveApiBtn" class="primary-btn">保存して始める</button>
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" class="modal hidden">
        <div class="modal-content glass-card stats-modal-content">
            <div class="modal-header">
                <h2>📊 成績・統計ダッシュボード</h2>
                <button id="closeStatsBtn" class="icon-btn">✖</button>
            </div>
            
            <div class="stats-overview mt-4">
                <div class="stat-box">
                    <div class="stat-label">総出題数</div>
                    <div class="stat-value" id="totalQuestionsStat">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">総合正答率</div>
                    <div class="stat-value" id="overallAccuracyStat">0%</div>
                </div>
            </div>

            <div class="stats-details mt-4">
                <h3>分野別の成績</h3>
                <div id="categoryStatsList" class="category-stats-list">
                    <!-- Populated by JS -->
                </div>
            </div>
            
            <div class="modal-actions mt-4 border-top pt-4">
                <button id="resetStatsBtn" class="danger-btn">データをリセット</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
